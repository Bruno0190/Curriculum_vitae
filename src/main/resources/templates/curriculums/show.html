<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Show</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Thymeleaf -->
    <meta xmlns:th="http://www.thymeleaf.org">
    <!-- CSS Per Stampa -->
    <link rel="stylesheet" href="/css/print_style.css">
    <!-- Semplice CSS per lista senza punti -->
    <style>
        .no-bullet {
            list-style-type: none;
            padding-left: 0;
            margin-left: 0;
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar"></div>

    <main>
    
    <div id="container_cv" class="container" th:object="${curriculum}">

        <div id="row_cv" class="row">
<!-- COLONNA SINISTRA -->
            <div class="col-12 col-lg-4 left-col">
<!-- SEZIONE FOTO -->
                <section id="FOTO">

                    <img th:if="${#strings.isEmpty(image_profile_Url)}"
                            src="/images/Anonymous.jpeg"
                            class="img-fluid py-0 px-3 rounded-5 mx-5 my-3" 
                            style="max-width:350px;"
                            alt="Profile Picture">

                        <img th:unless="${#strings.isEmpty(image_profile_Url)}"
                            th:src="*{image_profile_Url}"
                            class="img-fluid py-0 px-3 rounded-5 mx-5 my-3" 
                            style="max-width:350px;"
                            alt="Profile Picture">

                </section>
<!-- SEZIONE CONTATTI -->
                <section id="CONTATTI" class="py-0 px-3 mx-5 my-3">

                    <h4 style="font-size: 25px" th:text="${tradotto['contatti'] != null ? tradotto['contatti'] : 'CONTATTI'}"></h4>
                    <a th:text="*{contact_email}"
                       th:href="'mailto:' + *{contact_email}">
                    </a><br>
                    <a th:text="*{contact_phone}"
                       th:href="'tel:' + *{contact_phone}">
                    </a><br>
                    <a th:href="*{contact_linkedin}" target="_blank">LinkedIn
                    </a>
                    <span> | </span>
                    <a th:href="*{contact_github}" target="_blank">GitHub
                    </a>

                </section>
<!-- SEZIONE COMPETENZE TECNICHE -->
                <section id="COMPETENZE_TECNICHE" class="py-0 px-3 mx-5 my-3">

                    <h4 style="font-size: 25px" th:text="${tradotto['competenze'] != null ? tradotto['competenze'] : 'COMPETENZE TECNICHE'}"></h4>
                    <ul>
                        <li th:if="${tradotto['skill_list']} != null" th:text="${tradotto['skill_list']}"></li>
                        <li th:if="${tradotto['skill_list']} == null" th:each="skill : *{skills}" th:text="${skill.skill_name}"></li>
                    </ul>

                </section>
<!-- SEZIONE PROGETTI -->
                <section id="PROGETTI" class="py-0 px-3 mx-5 my-3">

                    <h4 style="font-size: 25px" th:text="${tradotto['progetti'] != null ? tradotto['progetti'] : 'PROGETTI'}"></h4>
                    <ul>
                        <li th:if="${tradotto['project_list']} != null" th:text="${tradotto['project_list']}"></li>
                        <li th:if="${tradotto['project_list']} == null" th:each="project : *{projects}">
                            <strong><a th:text="${project.projectName}"
                               th:href="${project.url}" target="_blank">
                            </a></strong>
                            <br>
                            <p th:text="${project.description}"></p>
                        </li>
                    </ul>

                </section>

            </div>
<!-- COLONNA DESTRA -->
            <div class="col-12 col-lg-8 right-col">
<!-- SEZIONE NOME E TITOLO -->
                <section id="NOME_TITOLO" class="mb-3">

                    <h2 th:text="*{user.name}" style="font-size: 45px;"></h2>
                    <h3 th:text="*{profile_role}" style="font-size: 30px; margin-bottom: 30px;"></h3>

                </section>
<!-- SEZIONE PROFILO -->
                <section id="PROFILO" class="mb-3">

                    <h3 style="font-size: 25px;color:cornflowerblue;" th:text="${tradotto['profilo'] != null ? tradotto['profilo'] : 'PROFILO'}"></h3>
                    <p th:if="${tradotto['profile_description']} != null" th:text="${tradotto['profile_description']}" style="margin-bottom: 20px;"></p>
                    <p th:if="${tradotto['profile_description']} == null" th:text="*{profile_description}" style="margin-bottom: 20px;"></p>

                </section>
<!-- SEZIONE ESPERIENZA -->
                <section id="ESPERIENZA" class="mb-3">
                    <h3 style="font-size: 25px;color:cornflowerblue;" th:text="${tradotto['esperienza'] != null ? tradotto['esperienza'] : 'ESPERIENZA'}"></h3>
                    <ul class="no-bullet">
                        <li th:if="${tradotto['experience_list']} != null" th:text="${tradotto['experience_list']}"></li>
                        <li th:if="${tradotto['experience_list']} == null" th:each="experience : *{experiences}">
                            <strong>
                                <h4 th:text="${experience.companyName}" style="font-size: 20px"></h4>
                                <br>
                                 <h4 style="font-size: 20px"
                                    th:text="${experience.startMonth + '/' + experience.startYear} + ' - ' + 
                                    (experience.inProgress ? 'In Progress' : experience.endMonth + '/' + experience.endYear)">
                                </h4>
                            </strong>
                            <em>
                                <h4 th:text="${experience.company_description}" style="font-size: 16px; font-weight:400"></h4>
                            </em>
<!-- SEZIONE LAVORO -->
                            <div id="LAVORO" class="mt-3">
                                <ul class="no-bullet">
                                    <li th:each="job : ${experience.jobs}">
                                        <u>
                                            <h5 th:text="${job.jobTitle}" style="font-size: 16px"></h5>
                                        </u>
                                        <br>
                                        <span class="text-muted" style="font-size: 20px"
                                            th:text="${job.startMonth + '/' + job.startYear} + ' - ' + 
                                            (job.inProgress ? 'In Progress' : job.endMonth + '/' + job.endYear)">
                                        </span>
<!-- SEZIONE TASK -->
                                        <div id="TASK" class="mt-3">
                                            <ul>
                                                <li th:each="task : ${job.jobTask}" >
                                                    <strong>
                                                        <span th:text="${task.task} + ': '"></span>
                                                        <span th:text="${task.task_description}"></span>
                                                    </strong>
                                                </li>
                                            </ul>
                                        </div>
                                    </li>
                                </ul>
                            </div>                         
                        </li>
                    </ul>
                </section>

<!-- SEZIONE ISTRUZIONE -->
                <section id="ISTRUZIONE" class="mb-3">
                    <h3 style="font-size: 25px;color:cornflowerblue;" th:text="${tradotto['istruzione'] != null ? tradotto['istruzione'] : 'ISTRUZIONE'}"></h3>
                    <ul>
                        <li th:if="${tradotto['education_list']} != null" th:text="${tradotto['education_list']}"></li>
                        <li th:if="${tradotto['education_list']} == null" th:each="education : *{educations}">
                            <strong>
                                <span th:text="${education.title}"></span>
                            </strong>
                            <br>
                            <span class="text-muted" style="font-size: 20px"
                                th:text="${education.startMonth + '/' + education.startYear} + ' - ' + 
                                (education.inProgress ? 'In Progress' : education.endMonth + '/' + education.endYear)">
                            </span>
                            <br>
                            <p th:text="${education.description}"></p>
                            <br>
                            <a th:unless="${#strings.isEmpty(education.image_certificate_Url)}"th:href="*{education.image_certificate_Url}">View Degree</a>
                            <a th:unless="${#strings.isEmpty(education.link)}" th:href="*{education.link}">Link Reference</a>
                        </li>
                    </ul>
                </section>
<!-- SEZIONE LINGUE -->
                <section id="LINGUE" class="mb-3">
                    <h3 style="font-size: 25px;color:cornflowerblue;" th:text="${tradotto['lingue'] != null ? tradotto['lingue'] : 'LINGUE'}"></h3>
                    <ul>
                        <li th:if="${tradotto['language_list']} != null" th:text="${tradotto['language_list']}"></li>
                        <li th:if="${tradotto['language_list']} == null" th:each="language : *{languages}">
                            <strong>
                                <span th:text = "${language.language_name} + ': '"></span>
                            </strong>
                                <span th:text="${language.proficiency_level}"></span>
                                <span th:if="${language.school_String != null}" th:text="' (' + ${language.school_String} + ')'" style="font-size: 12px; color: #888;"></span>
                        </li>
                    </ul>

                </section>

            </div>

        </div>

    </div>
    </main>

    <footer id="cv_footer" class="d-flex justify-content-between m-3">
        <p id="trattamento_dati" class="text-end" style="font-size: 12px;">
            Autorizzo il trattamento dei miei dati personali presenti<br> nel CV ai sensi dell’art. 13 d. lgs. 30 giugno 2003 n. 196-<br> “Codice in materia di protezione dei dati personali”<br> e dell’art. 13 GDPR 679/16 -
        </p>
        <div class="bottone_scarica_pdf">
            <button th:if="${isOwner}">
                <a th:href="@{/curriculums/edit/{id}(id=${curriculum.id})}">Edit</a>
            </button>
            <button th:if="${isOwner}">
                <a th:href="@{/curriculums/delete/{id}(id=${curriculum.id})}">Delete</a>
            </button>
            <label for="translationSelect">Translate to:</label>
            <form th:action="@{/curriculums/translate/{id}(id=${curriculum.id})}" method="post" id="translateForm">
                <select name="languages" id="translationSelect" onchange="document.getElementById('translateForm').submit();">
                    <option value="en">English</option>
                    <option value="it">Italian</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="pt">Portuguese</option>
                    <option value="nl">Dutch</option>
                    <option value="pl">Polish</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="zh">Chinese (Simplified)</option>
                    <option value="zh-TW">Chinese (Traditional)</option>
                    <option value="tr">Turkish</option>
                    <option value="ar">Arabic</option>
                    <option value="ko">Korean</option>
                    <option value="sv">Swedish</option>
                    <option value="fi">Finnish</option>
                    <option value="el">Greek</option>
                    <option value="cs">Czech</option>
                    <option value="hu">Hungarian</option>
                    <option value="bg">Bulgarian</option>
                    <option value="ro">Romanian</option>
                    <option value="da">Danish</option>
                    <option value="sk">Slovak</option>
                    <option value="uk">Ukrainian</option>
                    <option value="id">Indonesian</option>
                    <option value="th">Thai</option>
                    <option value="vi">Vietnamese</option>
                </select>
            </form>

            <button onclick="window.location.href='/genera-pdf'">
                Scarica PDF
            </button>
        </div>
    </footer>
    
</body>
</html>
