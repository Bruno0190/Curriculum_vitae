<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>
<h2>Login</h2>


<div th:if="${param.error}" class="alert alert-danger">
    <span th:switch="${param.error}">
        <span th:case="'not_authenticated'">Please login before continuing.</span>
        <span th:case="'not_registered'">Your account is not registered. Please register before continuing.</span>
        <span th:case="'curriculum_exists'">You already have a curriculum: you cannot create another one.</span>
        <span th:case="*">An error has occurred.</span>
    </span>
</div>



<form th:action="@{/login}" method="post">
    <label for="email">Email:</label>
    <input type="text" id="email" name="email" required />
    <br/>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required />
    <br/>
    <button type="submit">Access</button>
</form>
</body>
</html>
