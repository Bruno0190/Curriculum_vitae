<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2f7 0%, #e5e7eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 14px 30px rgba(17, 24, 39, 0.12);
            padding: 1.5rem;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-login {
            border-radius: 10px;
            box-shadow: 0 6px 14px rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="mb-3">Login</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            <span th:switch="${param.error}">
                <span th:case="'not_authenticated'">Please login before continuing.</span>
                <span th:case="'not_registered'">Your account is not registered. Please register before continuing.</span>
                <span th:case="'curriculum_exists'">You already have a curriculum: you cannot create another one.</span>
                <span th:case="*">An error has occurred.</span>
            </span>
        </div>

        <form th:action="@{/login}" method="post" class="d-grid gap-3">
            <div>
                <label for="email" class="form-label">Email</label>
                <input type="text" id="email" name="email" class="form-control" required />
            </div>
            <div>
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary btn-login">Access</button>
        </form>
    </div>
</body>
</html>
